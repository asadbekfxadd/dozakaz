<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CINEMATRIX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --accent: #e50914;
    --accent2: #ff4444;
    --gold: #f5c518;
    --text: #ffffff;
    --text2: #a0a0b0;
    --text3: #606070;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    padding: 14px 16px 10px;
    background: linear-gradient(to bottom, var(--bg) 80%, transparent);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(229,9,20,0.5);
  }
  .logo span { color: var(--text); }

  /* SEARCH */
  .search-wrap {
    padding: 0 16px 12px;
    position: sticky; top: 56px; z-index: 99;
    background: linear-gradient(to bottom, var(--bg) 60%, transparent);
  }
  .search-box {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    padding: 10px 16px;
    transition: border-color .2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box svg { flex-shrink: 0; opacity: .5; }
  .search-box input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif;
  }
  .search-box input::placeholder { color: var(--text3); }
  .clear-btn { display: none; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 0 2px; }

  /* GENRES */
  .genres-wrap { padding: 0 16px 16px; }
  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    color: var(--text3); text-transform: uppercase; margin-bottom: 10px;
  }
  .genres {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: none;
  }
  .genres::-webkit-scrollbar { display: none; }
  .genre-chip {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 50px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1);
    background: var(--bg3);
    color: var(--text2);
    transition: all .2s;
    white-space: nowrap;
  }
  .genre-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .genre-chip:active { transform: scale(0.96); }

  /* MOVIES GRID */
  .section { padding: 0 16px 20px; }
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .movie-card {
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg3);
    cursor: pointer;
    transition: transform .2s;
    position: relative;
  }
  .movie-card:active { transform: scale(0.97); }
  .poster-wrap {
    position: relative;
    aspect-ratio: 2/3;
    overflow: hidden;
  }
  .poster-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .3s;
  }
  .movie-card:hover .poster-wrap img { transform: scale(1.04); }
  .poster-placeholder {
    width: 100%; height: 100%;
    background: var(--bg2);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
  }
  .rating-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 12px; font-weight: 600;
    color: var(--gold);
    display: flex; align-items: center; gap: 3px;
  }
  .card-info { padding: 10px 10px 12px; }
  .card-title {
    font-size: 13px; font-weight: 600;
    line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-year { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* DETAIL MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    overflow-y: auto;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    min-height: 100%;
    transform: translateY(30px);
    transition: transform .25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-backdrop {
    height: 280px;
    position: relative;
    overflow: hidden;
  }
  .modal-backdrop img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
  }
  .modal-backdrop-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 30%, var(--bg));
  }
  .modal-close {
    position: absolute; top: 14px; right: 14px;
    width: 34px; height: 34px;
    background: rgba(0,0,0,0.6);
    border: none; border-radius: 50%;
    color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-content { padding: 0 16px 40px; background: var(--bg); }
  .modal-header { display: flex; gap: 14px; margin-bottom: 16px; }
  .modal-poster {
    width: 90px; height: 135px; border-radius: 10px;
    object-fit: cover; flex-shrink: 0;
    margin-top: -50px; position: relative;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  }
  .modal-meta { padding-top: 6px; flex: 1; min-width: 0; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 1px;
    line-height: 1.1; margin-bottom: 6px;
  }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag {
    font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text2);
  }
  .tag.red { border-color: var(--accent); color: var(--accent); }
  .modal-rating {
    font-size: 22px; font-weight: 700;
    color: var(--gold);
    display: flex; align-items: center; gap: 5px;
  }
  .modal-rating span { font-size: 13px; font-weight: 400; color: var(--text3); }
  .modal-overview {
    font-size: 14px; line-height: 1.7;
    color: var(--text2); margin-bottom: 20px;
  }
  .modal-cast { margin-bottom: 20px; }
  .cast-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .cast-list::-webkit-scrollbar { display: none; }
  .cast-item { flex-shrink: 0; text-align: center; width: 68px; }
  .cast-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--bg3);
    margin: 0 auto 5px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.08);
  }
  .cast-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .cast-name { font-size: 10px; font-weight: 500; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cast-char { font-size: 9px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .similar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .similar-card { border-radius: 8px; overflow: hidden; cursor: pointer; background: var(--bg3); }
  .similar-poster { aspect-ratio: 2/3; overflow: hidden; }
  .similar-poster img { width: 100%; height: 100%; object-fit: cover; }
  .similar-title { font-size: 10px; font-weight: 500; padding: 5px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* LOADER */
  .loader { display: flex; justify-content: center; padding: 40px; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg3); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px; padding: 10px 20px;
    font-size: 13px; color: var(--text);
    opacity: 0; transition: all .25s; z-index: 300;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">CINEMA<span>TRIX</span></div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Фильм, сериал, актёр..." autocomplete="off">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">×</button>
  </div>
</div>

<div class="genres-wrap">
  <div class="section-title">Жанры</div>
  <div class="genres" id="genresList"></div>
</div>

<div class="section">
  <div class="section-title" id="sectionLabel">Сейчас популярно</div>
  <div id="moviesContainer"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-backdrop">
      <img id="modalBackdrop" src="" alt="">
      <div class="modal-backdrop-gradient"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-content">
      <div class="modal-header">
        <img class="modal-poster" id="modalPoster" src="" alt="">
        <div class="modal-meta">
          <div class="modal-title" id="modalTitle"></div>
          <div class="modal-tags" id="modalTags"></div>
          <div class="modal-rating" id="modalRating"></div>
        </div>
      </div>
      <div class="modal-overview" id="modalOverview"></div>
      <div class="modal-cast" id="modalCastSection" style="display:none">
        <div class="section-title" style="margin-bottom:10px">В ролях</div>
        <div class="cast-list" id="castList"></div>
      </div>
      <div id="similarSection" style="display:none">
        <div class="section-title" style="margin-bottom:10px">Похожие фильмы</div>
        <div class="similar-grid" id="similarGrid"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = new URLSearchParams(location.search).get('api_key') || '09855c535adf268264303e4974910ce6';
const BASE = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/w500';
const IMG_BIG = 'https://image.tmdb.org/t/p/w780';

const genres = [
  {id: 0, name: '🔥 Все'},
  {id: 28, name: '💥 Боевик'},
  {id: 35, name: '😂 Комедия'},
  {id: 18, name: '🎭 Драма'},
  {id: 27, name: '👻 Ужасы'},
  {id: 878, name: '🚀 Фантастика'},
  {id: 10749, name: '❤️ Романтика'},
  {id: 16, name: '🎨 Анимация'},
  {id: 53, name: '🔪 Триллер'},
  {id: 12, name: '🗺 Приключения'},
];

let activeGenre = 0;
let searchTimer = null;
let currentMovies = [];

function api(endpoint, params = {}) {
  const p = new URLSearchParams({api_key: API_KEY, language: 'ru-RU', ...params});
  return fetch(`${BASE}${endpoint}?${p}`).then(r => r.json());
}

function renderGenres() {
  const el = document.getElementById('genresList');
  el.innerHTML = genres.map(g => `
    <div class="genre-chip ${g.id === activeGenre ? 'active' : ''}" onclick="selectGenre(${g.id}, '${g.name}')">
      ${g.name}
    </div>`).join('');
}

function selectGenre(id, name) {
  activeGenre = id;
  renderGenres();
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  if (id === 0) {
    document.getElementById('sectionLabel').textContent = 'Сейчас популярно';
    loadPopular();
  } else {
    document.getElementById('sectionLabel').textContent = name.replace(/^\S+\s/, '');
    loadByGenre(id);
  }
}

function showLoader() {
  document.getElementById('moviesContainer').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
}

function renderMovies(movies) {
  currentMovies = movies;
  if (!movies.length) {
    document.getElementById('moviesContainer').innerHTML = `
      <div class="empty-state">
        <div class="icon">🎬</div>
        <p>Ничего не найдено</p>
      </div>`;
    return;
  }
  document.getElementById('moviesContainer').innerHTML = `
    <div class="movies-grid">
      ${movies.map((m, i) => `
        <div class="movie-card" onclick="openMovie(${m.id})" style="animation: fadeIn .3s ease ${i * 0.05}s both">
          <div class="poster-wrap">
            ${m.poster_path
              ? `<img src="${IMG}${m.poster_path}" alt="${m.title}" loading="lazy">`
              : `<div class="poster-placeholder">🎬</div>`}
            <div class="rating-badge">★ ${m.vote_average ? m.vote_average.toFixed(1) : '—'}</div>
          </div>
          <div class="card-info">
            <div class="card-title">${m.title || m.name}</div>
            <div class="card-year">${(m.release_date || m.first_air_date || '').slice(0,4)}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

async function loadPopular() {
  showLoader();
  const d = await api('/movie/popular');
  renderMovies(d.results || []);
}

async function loadByGenre(id) {
  showLoader();
  const d = await api('/discover/movie', {with_genres: id, sort_by: 'popularity.desc'});
  renderMovies(d.results || []);
}

async function searchMovies(q) {
  showLoader();
  document.getElementById('sectionLabel').textContent = `Результаты: "${q}"`;
  const d = await api('/search/movie', {query: q});
  renderMovies(d.results || []);
}

async function openMovie(id) {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  const [movie, credits, similar] = await Promise.all([
    api(`/movie/${id}`),
    api(`/movie/${id}/credits`),
    api(`/movie/${id}/similar`),
  ]);

  document.getElementById('modalBackdrop').src = movie.backdrop_path ? IMG_BIG + movie.backdrop_path : '';
  document.getElementById('modalPoster').src = movie.poster_path ? IMG + movie.poster_path : '';
  document.getElementById('modalTitle').textContent = movie.title;

  const year = (movie.release_date || '').slice(0,4);
  const runtime = movie.runtime ? `${movie.runtime} мин` : '';
  const tags = document.getElementById('modalTags');
  tags.innerHTML = [
    year && `<span class="tag">${year}</span>`,
    runtime && `<span class="tag">${runtime}</span>`,
    ...(movie.genres || []).slice(0,2).map(g => `<span class="tag">${g.name}</span>`),
  ].filter(Boolean).join('');

  document.getElementById('modalRating').innerHTML =
    `★ ${movie.vote_average ? movie.vote_average.toFixed(1) : '—'} <span>/ 10 · ${movie.vote_count?.toLocaleString()} оценок</span>`;

  document.getElementById('modalOverview').textContent = movie.overview || 'Описание отсутствует.';

  const cast = (credits.cast || []).slice(0, 8);
  if (cast.length) {
    document.getElementById('modalCastSection').style.display = 'block';
    document.getElementById('castList').innerHTML = cast.map(a => `
      <div class="cast-item">
        <div class="cast-avatar">
          ${a.profile_path ? `<img src="${IMG}${a.profile_path}" loading="lazy">` : '👤'}
        </div>
        <div class="cast-name">${a.name}</div>
        <div class="cast-char">${a.character}</div>
      </div>`).join('');
  }

  const sim = (similar.results || []).slice(0, 6);
  if (sim.length) {
    document.getElementById('similarSection').style.display = 'block';
    document.getElementById('similarGrid').innerHTML = sim.map(m => `
      <div class="similar-card" onclick="openMovie(${m.id})">
        <div class="similar-poster">
          ${m.poster_path ? `<img src="${IMG}${m.poster_path}" loading="lazy">` : '<div style="background:var(--bg2);height:100%;display:flex;align-items:center;justify-content:center">🎬</div>'}
        </div>
        <div class="similar-title">${m.title}</div>
      </div>`).join('');
  }

  document.getElementById('modal').scrollTop = 0;
  overlay.scrollTop = 0;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  selectGenre(0, '');
}

document.getElementById('searchInput').addEventListener('input', function() {
  const val = this.value.trim();
  document.getElementById('clearBtn').style.display = val ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (val.length >= 2) {
    searchTimer = setTimeout(() => searchMovies(val), 500);
  } else if (!val) {
    activeGenre = 0;
    renderGenres();
    loadPopular();
  }
});

const style = document.createElement('style');
style.textContent = `@keyframes fadeIn { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:none } }`;
document.head.appendChild(style);

renderGenres();
loadPopular();

if (window.Telegram?.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
